[pytest]
# ---------------------------------------------------------------------------
# pytest configuration for xml_extractor test suite
# ---------------------------------------------------------------------------

# Default options applied to every `pytest` invocation.
# --cov=xml_extractor   → matches the FILE stem  xml_extractor.py
#                          NOT the class name XMLExtractor
# --cov-report=term-missing  → shows which lines are not covered in the terminal
# --cov-report=html          → also writes htmlcov/ for browser review
# -v                         → verbose test names
addopts =
    --cov=xml_extractor
    --cov=decorators
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -v

# Tell coverage which source files matter (keeps noise out of the report).
# This is equivalent to putting [run] source = ... in .coveragerc
# but keeping everything in one file is simpler.

testpaths = .

# Minimum overall coverage gate – pytest-cov will fail the run if the
# combined coverage of xml_extractor + decorators drops below this value.
# Set to 0 to disable the gate while you are still building out tests.
# Raise it gradually as coverage improves (suggested target: 80).
# --cov-fail-under=80
