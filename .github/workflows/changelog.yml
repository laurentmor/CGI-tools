name: Generate Changelog
# This workflow generates a CHANGELOG.md file based on git commit messages when a new tag is pushed.
on:
  push:
    tags:
      - 'v*.*.*'
# Note: this workflow is triggered on tag pushes (e.g., v1.2.3) to generate a changelog for that release.
jobs:
  changelog:
    runs-on: ubuntu-latest
# This job checks out the code, generates a CHANGELOG.md file from git commit messages, and uploads it as an artifact.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        # The fetch-depth: 0 is important to ensure we have the full git history available for generating the changelog.
      - name: Generate CHANGELOG.md
        run: |
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## ${{ github.ref_name }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
# This simple approach generates a changelog with the format:
# # Changelog
# ## v1.2.3
# - Commit message 1 (abc123)
# - Commit message 2 (def456)
# You can customize the git log format as needed to include more details (e.g., author, date).
# The generated CHANGELOG.md will be included in the release notes when the release is created.   

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md