# This workflow automates the release process for the XMLExtractor project. It is triggered when a new tag matching the pattern 'v*.*.*' is pushed to the repository, indicating a new version release. The workflow performs several steps to prepare and publish the release on GitHub.
# The workflow includes the following steps:
# 1. Checkout the repository to access the code and history.
# 2. Generate a CHANGELOG.md file based on the commit messages since the last tag, providing a summary of changes for the new release.
# 3. Create a ZIP package of the XMLExtractor code for distribution.
# 4. Create a GitHub Release using the softprops/action-gh-release action, attaching the generated changelog and ZIP package to the release notes.
# The GITHUB_TOKEN secret is used to authenticate with the GitHub API for creating the release. Make sure to set this token in your repository's secrets for the workflow to function correctly.
# The workflow is defined in the .github/workflows/release.yml file and is structured to ensure a smooth and automated release process, reducing manual effort and potential errors when publishing new versions of the XMLExtractor project.
# The workflow is triggered on tag pushes (e.g., v1.2.3) to generate a changelog for that release.
# The generated CHANGELOG.md will be included in the release notes when the release is created.
#
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
# Note: this workflow is triggered on tag pushes (e.g., v1.2.3) to generate a changelog for that release.
jobs:
  release:
    runs-on: ubuntu-latest
# This job checks out the code, generates a CHANGELOG.md file from git commit messages, and uploads it as an artifact.
    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important pour historique

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📜 Generate changelog (simple & fiable)
      - name: Generate CHANGELOG.md
        run: |
          git log --pretty=format:"- %s (%h)" > ../CHANGELOG.md

      # 📦 Create ZIP package
      - name: Create ZIP
        run: zip -r XMLExtractor-${{ github.ref_name }}.zip .

      # 🚀 Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: XMLExtractor-1.2/XMLExtractor-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}