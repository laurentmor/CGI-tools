name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important pour historique

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📜 Generate changelog (simple & fiable)
      - name: Generate CHANGELOG.md
        run: |
          git log --pretty=format:"- %s (%h)" > ../CHANGELOG.md

      # 📦 Create ZIP package
      - name: Create ZIP
        run: zip -r XMLExtractor-${{ github.ref_name }}.zip .

      # 🚀 Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: XMLExtractor-1.2/XMLExtractor-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}