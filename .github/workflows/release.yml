name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ Install git-cliff (robuste, sans Docker)
      - name: Install git-cliff
        run: |
          wget https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz
          file git-cliff-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf git-cliff-x86_64-unknown-linux-gnu.tar.gz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      # 📜 Generate changelog
      - name: Generate CHANGELOG.md
        run: git cliff -o ../CHANGELOG.md

      # 📦 Create ZIP
      - name: Create ZIP
        run: zip -r XMLExtractor-${{ github.ref_name }}.zip .

      # 🚀 Create Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: XMLExtractor-1.2/XMLExtractor-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}