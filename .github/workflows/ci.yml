name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: XMLExtractor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyzipper

      - name: Install project
        run: pip install -e .

      - name: Run tests
        run: |
            PYTHONPATH=src pytest tests/ \
            --cov=xml_extractor \
            --cov=decorators \
            --cov-report=xml \
            --cov-report=term