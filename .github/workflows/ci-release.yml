name: CI + Release Please
env:
  # Important: force JavaScript actions to use Node 24 (required for release-please v4)
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  issues: write

# -------------------------------------------------------------------
jobs:

  # =========================
  # 🧪 TESTS + COVERAGE
  # =========================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'   # 🔥 speed up

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyzipper

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=xml_extractor \
            --cov=decorators \
            --cov-report=xml \
            --cov-report=term

      # ✅ FIX IMPORTANT: path relatif au working-directory
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml   # 🔥 corrigé
          fail_ci_if_error: true

  # =========================
  # 🤖 RELEASE PLEASE
  # =========================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout (important)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 requis pour les tags

      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}