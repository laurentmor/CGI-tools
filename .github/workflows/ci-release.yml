name: CI + Semantic Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyzipper || true

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=xml_extractor \
            --cov=decorators \
            --cov-report=term \
            --cov-report=xml

      # 📦 Upload coverage (une seule fois)
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: XMLExtractor-1.2/coverage.xml

      # ☁️ Codecov (recommandé)
      - name: Upload to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install semantic-release
        run: pip install python-semantic-release

      # 📥 récupérer coverage
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      # 📊 extraire le % de coverage
      - name: Extract coverage %
        id: coverage
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage.xml | head -1)
          PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d'.' -f1)
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT

      # 🚀 release automatique (version + tag + changelog)
      - name: Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish

      # 🔎 récupérer le tag créé
      - name: Get latest tag
        id: tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      # ✨ enrichir la release avec coverage
      - name: Update Release with Coverage
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body: |
            📊 **Coverage:** ${{ steps.coverage.outputs.percent }}%

            ---
            
            🤖 Generated with semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}