name: CI + Semantic Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyzipper || true

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=xml_extractor \
            --cov=decorators \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      # 📦 Upload coverage (une seule fois)
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: XMLExtractor-1.2/coverage.xml

      # ☁️ Codecov (optionnel mais recommandé)
      - name: Upload to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'   # ❗ pas de release sur PR

    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install semantic-release
        run: pip install python-semantic-release

      # 📥 Récupérer coverage
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      # 🚀 Version + Tag + Changelog + Release
      - name: Run Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish

      # 📎 Ajouter coverage à la release
      - name: Attach coverage to release
        uses: softprops/action-gh-release@v2
        with:
          files: coverage.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}