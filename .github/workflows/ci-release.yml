
name: CI + Release Please

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  issues: write

# -------------------------------------------------------------------
jobs:

  # =========================
  # 🧪 TESTS + COVERAGE
  # =========================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: XMLExtractor-1.2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyzipper

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=xml_extractor \
            --cov=decorators \
            --cov-report=xml \
            --cov-report=term

      # Upload coverage for Codecov (recommended)
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: XMLExtractor-1.2/coverage.xml
          fail_ci_if_error: true

  # =========================
  # 🤖 RELEASE PLEASE
  # =========================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: test

    if: github.event_name == 'push'

    steps:
      - name: Run Release Please
        uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          